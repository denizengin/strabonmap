       Gold = the car's rail finial (single gold accent). -->
  <ellipse class="sh" cx="50" cy="88" rx="42" ry="4.5"/>
      <!-- draw pole from the car to the horse's girth -->
      <path class="wood" d="M34 64 L58 52 L59 55 L35 67 Z"/>
      <path class="out-thin" fill="none" d="M34 64 L58 52"/>
      <!-- the drawing horse — the proven horse master, scaled onto the pole -->
      <g transform="translate(46,14) scale(0.54)">
        <path class="wood" d="M30 58 L26 86 L30 86 L34 58 Z"/>
