<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Aeroplane">
  <!-- 1930s monoplane, 3/4 side view. Light from TOP-LEFT.
       Cigar fuselage + one prominent wing + tail fin + nose propeller disc.
       Gold = propeller spinner hub (single gold accent). -->
  <ellipse class="sh" cx="50" cy="86" rx="36" ry="4.5"/>
  <!-- fuselage: long cigar, lit upper + shadow belly -->
  <path class="wall" d="M14 48 q4 -7 14 -7 L78 44 q9 1 9 6 L14 50 Z"/>
  <path class="wall-s" d="M14 50 L87 50 q-2 4 -9 5 L28 59 q-10 0 -14 -7 Z"/>
  <path class="out-thin" fill="none" d="M14 50 L84 50"/>
  <!-- tail fin (upright) + rear stabiliser -->
  <path class="roof" d="M14 49 L6 30 L13 33 L20 47 Z"/>
  <path class="roof-s" d="M14 49 L4 53 L12 51 L20 50 Z"/>
  <path class="out-thin" fill="none" d="M14 49 L6 30 M14 49 L4 53"/>
  <!-- ONE prominent wing crossing the fuselage (lit top + shadow under) -->
  <path class="wood-l" d="M30 50 L74 50 L82 66 L46 66 Z"/>
  <path class="wood" d="M46 66 L82 66 L84 72 L52 72 Z"/>
  <path class="out-thin" fill="none" d="M30 50 L74 50 M46 66 L82 66"/>
  <!-- cockpit canopy -->
  <path class="win" d="M42 41 q9 -5 18 -3 L58 47 L44 47 Z"/>
  <path class="out-thin" fill="none" d="M42 41 q9 -5 18 -3"/>
  <!-- nose cowl + propeller disc (blades top & bottom) + spinner -->
  <path class="copper" d="M86 45 q8 0 9 5 q-1 5 -9 5 Z"/>
  <path class="out-thin" fill="none" d="M95 28 L91 50 M95 72 L91 50"/>
  <ellipse class="hi" cx="95" cy="40" rx="1.6" ry="9" transform="rotate(8 95 40)"/>
  <circle class="gold" cx="95" cy="50" r="3"/>
  <!-- primary contour -->
  <path class="out" fill="none" d="M14 48 q4 -7 14 -7 L78 44 q9 1 9 6 q-2 4 -9 5 L28 59 q-10 0 -14 -7 Z"/>
</svg>
