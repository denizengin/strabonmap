<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Caravel">
  <!-- Age-of-sail CARAVEL / carrack. MULTI-MAST (three masts) with a mix
       of square sails forward and a lateen mizzen aft — the "many sails"
       silhouette. Light from TOP-LEFT; water hint. Gold mainmast truck =
       the one gold accent. -->
  <ellipse class="sh" cx="50" cy="84" rx="40" ry="4.5"/>
  <path class="water" d="M8 81 q10 4 21 0 q11 -4 21 0 q11 4 21 0 q10 -4 21 0 L92 87 L8 87 Z"/>
  <path class="foam" fill="none" d="M12 80 q8 3 16 0 M52 80 q8 3 16 0"/>
  <!-- three masts -->
  <path class="wood" d="M28 60 L29 30 L31 30 L30 60 Z"/>
  <path class="wood" d="M51 60 L52 14 L54 14 L53 60 Z"/>
  <path class="wood" d="M74 60 L75 34 L77 34 L76 60 Z"/>
  <circle class="gold" cx="53" cy="14" r="2.3"/>
  <!-- foremast square sail (lit + shadow) -->
  <path class="wall" d="M19 31 L41 31 L39 44 L21 44 Z"/>
  <path class="wall-s" d="M30 31 L41 31 L39 44 L30 44 Z"/>
  <path class="out-thin" fill="none" d="M19 31 L41 31 L39 44 L21 44 Z M30 31 L30 44"/>
  <!-- mainmast: upper + lower square sails (lit + shadow) -->
  <path class="wall" d="M40 17 L66 17 L64 30 L42 30 Z"/>
  <path class="wall-s" d="M53 17 L66 17 L64 30 L53 30 Z"/>
  <path class="out-thin" fill="none" d="M40 17 L66 17 L64 30 L42 30 Z M53 17 L53 30"/>
  <path class="wall" d="M40 33 L66 33 L64 48 L42 48 Z"/>
  <path class="wall-s" d="M53 33 L66 33 L64 48 L53 48 Z"/>
  <path class="out-thin" fill="none" d="M40 33 L66 33 L64 48 L42 48 Z M53 33 L53 48"/>
  <!-- mizzen lateen triangular sail aft (lit + shadow) -->
  <path class="wall" d="M76 36 L88 60 L76 58 Z"/>
  <path class="wall-s" d="M76 47 L88 60 L76 58 Z"/>
  <path class="out-thin" fill="none" d="M76 36 L88 60 L76 58 Z M76 47 L88 60"/>
  <!-- hull: lit upper strake + shadow lower hull, raised forecastle -->
  <path class="wood-l" d="M14 60 L86 60 L88 64 L12 64 Z"/>
  <path class="wood" d="M12 64 L88 64 q-4 11 -18 11 L30 75 q-14 0 -18 -11 Z"/>
  <path class="wood-l" d="M78 56 L90 56 L90 60 L78 60 Z"/>
  <path class="out-thin" fill="none" d="M78 56 L90 56 M78 56 L78 60"/>
  <!-- primary contour around the hull -->
  <path class="out" fill="none" d="M12 64 L88 64 q-4 11 -18 11 L30 75 q-14 0 -18 -11 Z"/>
</svg>
